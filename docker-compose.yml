services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - fiora_mongo_data:/data/db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: fiora
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      CORS_ORIGINS: "*"
    depends_on:
      - mongo

volumes:
  fiora_mongo_data:
